<script>
  /* Suppress the benign "ResizeObserver loop completed/limit exceeded" notice
     Chrome emits during harmless layout settling. Installed first, in the
     capture phase, and over console.error so no real errors are hidden. */
  (function () {
    var RE = /ResizeObserver loop/;
    /* Defer every ResizeObserver callback by a frame so none can trigger the
       benign synchronous "loop" notice the browser emits. */
    if (window.ResizeObserver) {
      var _RO = window.ResizeObserver;
      window.ResizeObserver = function (cb) {
        return new _RO(function (entries, obs) {
          window.requestAnimationFrame(function () {
            try { cb(entries, obs); } catch (e) {}
          });
        });
      };
      window.ResizeObserver.prototype = _RO.prototype;
    }
    function isRO(msg) { return typeof msg === 'string' && RE.test(msg); }
    var swallow = function (e) {
      if (e && isRO(e.message)) {
        e.stopImmediatePropagation();
        e.preventDefault();
        return false;
      }
    };
    window.addEventListener('error', swallow, true);
    window.addEventListener('error', swallow, false);
    var _onerror = window.onerror;
    window.onerror = function (msg) {
      if (isRO(msg)) return true;
      return _onerror ? _onerror.apply(this, arguments) : false;
    };
    var _ce = console.error;
    console.error = function () {
      if (isRO(arguments[0])) return;
      return _ce.apply(console, arguments);
    };
  })();
</script>

<style>
  /* Lighter warm paper than the DS default ivory (#F3EFDE), kept within the

  :root {
